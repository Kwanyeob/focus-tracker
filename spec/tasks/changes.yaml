version: 1
project: FocusScope
change_set: "M-01 JSONL foundation (INTERFACES.md compliant)"

context_files:
  - docs/architecture.md
  - docs/decisions.md
  - docs/interface.md
  - docs/roadmap.md
  - docs/scope.md

work_items:
  - id: M-01
    title: "JSONL foundation: EventRecord + jsonlWriter + checkpoint + recovery + 2h soak test"
    status: planned
    priority: P0
    owner: agent
    task_file: spec/tasks/M-01-jsonl-foundation.md

    scope:
      add_files:
        - src/storage/eventRecord.ts
        - src/storage/sessionManager.ts
        - src/storage/jsonlWriter.ts
        - src/storage/checkpoint.ts
        - src/storage/recovery.ts
        - scripts/soak/jsonl_soak_test.ts
        - test/jsonlWriter.test.ts
        - test/checkpoint.test.ts
        - test/recovery.test.ts
      modify_files: []
      exclude:
        - "sqlite implementation"
        - "cloud sync"
        - "compression"
        - "indexing"

    runtime_assumptions:
      language: "TypeScript (Node.js)"
      persistence: "local filesystem only"
      format: "JSONL append-only"
      concurrency: "single-process, serialized appends"

    implementation_constraints:
      - "INTERFACES.md takes precedence on naming/fields"
      - "Records must be 1 JSON object per line; no partial lines allowed"
      - "Checkpoint writes must be atomic via tmp + fsync + rename"
      - "After rename, directory should be fsync'ed if platform allows"
      - "Recovery must handle corrupted/partial last line via safe truncation"
      - "JSONL is source of truth; checkpoint must never override JSONL"
      - "jsonlWriter constructor must automatically execute recovery before first append"
      - "recoverIfNeeded remains public for testing only; callers must not be required to invoke it"
      - "Rotation: events-YYYYMMDD.jsonl and .N suffix when size-rotated (events-YYYYMMDD.1.jsonl, .2, ...)"
      - "Session: new session_id per process start; seq starts at 0 per session and increments by exactly 1"
      - "timezone_offset required (minutes from UTC)"
      - "monotonic_ms required and must not be bigint"
      - "monotonic_ms must be derived from process.hrtime.bigint() and converted to number milliseconds (Number(hrtime/1000000n)) or string before JSON serialization"
      - "Use crypto.randomUUID() for event_id and session_id random component; do not add external uuid dependency"

    acceptance:
      tests:
        - name: "unit"
          command: "npm test"
          must_pass: true
        - name: "soak_2h"
          command: "node scripts/soak/jsonl_soak_test.ts"
          must_pass: true

      success_criteria:
        - "All unit tests pass"
        - "Soak test runs for ~2 hours without corruption (or recovers correctly after intentional crashes)"
        - "JSONL output is parseable line-by-line (no JSON parse errors)"
        - "seq strictly monotonic per session; no duplicates"
        - "After recovery, checkpoint last_flushed_seq matches JSONL tail seq"
        - "Rotation produces correctly named files and preserves all flushed records"

    output_requirements_for_agent:
      - "Provide file-by-file summary of edits/additions"
      - "Provide commands to run unit tests and soak test"
      - "Explain any assumptions if repo layout differs"
      - "Do not change unrelated code paths"

  - id: M-02-AW
    title: "Active Window Tracking (Privacy-Safe)"
    status: planned
    priority: P0
    owner: agent
    task_file: spec/tasks/M-02-active-window.md

    scope:
      add_files:
        - capture/activeWindow.js
        - test/activeWindow.test.js
      modify_files: []
      exclude:
        - "input aggregation"
        - "scoring"
        - "semantic classification"
        - "SQLite changes"
        - "UI changes"

    runtime_assumptions:
      language: "Node.js (CommonJS)"
      os_support: "Windows + macOS"
      dependency:
        - "active-win"
      persistence: "Existing JSONL writer"

    implementation_constraints:
      - "Must comply with INTERFACES.md EventRecordV1 schema"
      - "window_title MUST be sanitized before persistence"
      - "No raw URLs, no raw emails, no raw file paths"
      - "monotonic_ms must be derived from process.hrtime.bigint() and converted to number"
      - "schema_version must be string (e.g. '1.0.0')"
      - "event_id must use crypto.randomUUID()"
      - "No external uuid library"
      - "Polling default interval: 1000ms"
      - "Change detection must compare app_name + sanitized window_title"
      - "Must not emit duplicate events if unchanged"
      - "Must handle null active window safely"
      - "Max window_title length 512 chars"

    acceptance:
      tests:
        - name: "unit"
          command: "npm test"
          must_pass: true

      success_criteria:
        - "Window change correctly detected"
        - "No duplicate emits when unchanged"
        - "Sanitized window title persisted"
        - "No raw URL stored"
        - "CPU usage acceptable under 2-hour run"
        - "No memory leak"

    output_requirements_for_agent:
      - "Provide full code for new files"
      - "Provide test instructions"
      - "Do not modify unrelated modules"
  - id: M-03-AW-FIX
    title: Active Window Capture Fix (separate context vs input metrics)
    type: refactor
    status: proposed
    owner: core
    priority: high
    depends_on:
      - M-02-AW
    docs:
      spec_md: spec/tasks/M-03-active-window-capture-fix.md

    summary:
      - Split WINDOW_CHANGE logging into two event types: active_window and input_summary
      - Remove input metrics from active_window events to eliminate zero-value spam
      - Aggregate input metrics periodically and/or flush on window change
      - Ensure duration calculations use monotonic_ms (not wall-clock)

    changes:
      schema:
        - add_field: type
          to: events
          required: true
        - add_event_type: active_window
        - add_event_type: input_summary
        - add_field: active_window_id
          to: input_summary
          required: true
        - remove_fields_from_event:
            event_type: active_window
            fields:
              - key_count
              - click_count
              - mouse_distance
              - scroll_delta
              - idle_ms
              - dwell_time_ms
      runtime:
        - on_window_change:
            - flush_input_summary_if_dirty: true
            - emit_active_window: true
        - periodic_input_flush_seconds:
            min: 5
            max: 30
        - dwell_time_calculation:
            method: monotonic_ms_delta
            formula: "next_active_window.monotonic_ms - current_active_window.monotonic_ms"

    files:
      add:
        - spec/tasks/M-03-active-window-capture-fix.md
      modify:
        - src/activeWindow/activeWindowCapture.js
        - src/input/inputAggregator.js
        - src/pipeline/eventWriter.js
        - src/schemas/event.schema.json
        - src/schemas/schema_version.json
      optional_modify:
        - src/utils/windowTitleNormalize.js

    acceptance_criteria:
      - "active_window events MUST NOT include key_count/click_count/mouse_distance/scroll_delta/idle_ms/dwell_time_ms"
      - "input_summary events MUST include aggregated input metrics and reference active_window_id"
      - "No meaningless zero-value spam (avoid flushing empty input_summary records)"
      - "Dwell time MUST be computable using monotonic_ms deltas"
      - "New events MUST include `type` field; legacy parsing remains supported during migration"

    migration:
      strategy: dual_parse
      notes:
        - "Legacy events remain readable"
        - "Analytics layer supports both legacy and new typed events during transition"
        - "Plan deprecation of legacy format in a later change item"
  - id: M-04-DWELL
    title: Dwell Time Engine (window-level duration calculation)
    type: feature
    status: proposed
    owner: core
    priority: high
    depends_on:
      - M-03-AW-FIX
    docs:
      spec_md: spec/tasks/M-04-dwell-time-engine.md

    summary:
      - Compute dwell time between consecutive active_window events
      - Emit window_dwell derived event
      - Use monotonic_ms for duration calculation
      - Ensure crash-safe window closure

    changes:
      schema:
        - add_event_type: window_dwell
        - add_field: window_event_id
        - add_field: start_monotonic_ms
        - add_field: end_monotonic_ms
        - add_field: dwell_time_ms

      runtime:
        - on_active_window_emit:
            - compute_previous_dwell: true
            - emit_window_dwell: true
        - ensure_no_unclosed_window: true
        - duration_method: monotonic_delta

    files:
      add:
        - src/engine/dwellEngine.js
      modify:
        - src/activeWindow/activeWindowCapture.js
        - src/pipeline/eventWriter.js
        - src/schemas/event.schema.json
        - src/schemas/schema_version.json

    acceptance_criteria:
      - "Each active_window generates exactly one window_dwell (except open window)"
      - "dwell_time_ms computed using monotonic_ms only"
      - "No negative durations"
      - "System handles restart without orphan dwell sessions"
  - id: M-05-SQLITE
    title: Local Storage Engine (SQLite)
    type: feature
    status: proposed
    owner: core
    priority: high
    depends_on:
      - M-03-AW-FIX
      - M-04-DWELL
    docs:
      spec_md: spec/tasks/M-05-local-storage-sqlite.md

    summary:
      - Persist all events to SQLite (events_raw)
      - Add derived tables for window_dwell and input_summary
      - Enable fast local queries for analytics and ML export

    changes:
      schema:
        - add_table: events_raw
        - add_table: window_dwell
        - add_table: input_summary
        - add_table: schema_version
      runtime:
        - event_writer_target: sqlite
        - wal_mode: true
        - migration_support: true

    files:
      add:
        - spec/tasks/M-05-local-storage-sqlite.md
        - src/storage/sqlite/db.js
        - src/storage/sqlite/migrations/001_init.sql
        - src/storage/sqlite/repository.js
      modify:
        - src/pipeline/eventWriter.js
        - src/schemas/event.schema.json
        - src/schemas/schema_version.json

    acceptance_criteria:
      - "All events are inserted into events_raw"
      - "window_dwell and input_summary are inserted into derived tables"
      - "Can query dwell totals by app/category for a given local day"
      - "DB is created and migrated automatically on startup"

  - id: M-06-FEATURES
    title: Feature Builder (30s ML-ready features)
    type: feature
    status: proposed
    owner: core
    priority: high
    depends_on:
      - M-05-SQLITE
    docs:
      spec_md: spec/tasks/M-06-feature-builder.md

    summary:
      - Generate fixed-window (30s) features from dwell + input summaries
      - Write features to SQLite for ML training and reporting
      - Support app category mapping and overlap-aware dwell allocation

    changes:
      schema:
        - add_table: features_30s
      runtime:
        - feature_window_seconds: 30
        - idempotent_feature_build: true
        - category_mapping_config: true

    files:
      add:
        - spec/tasks/M-06-feature-builder.md
        - src/features/categoryMap.js
        - src/features/featureBuilder.js
        - src/storage/sqlite/migrations/002_features_30s.sql
      modify:
        - src/cli/index.js

    acceptance_criteria:
      - "features_30s is generated continuously for recorded sessions"
      - "sum(category_ms) approximately equals window size"
      - "idle_ratio is within [0,1]"
      - "Re-running builder does not duplicate rows"

  - id: M-07-REPORTS
    title: Reporting MVP (daily/weekly CLI)
    type: feature
    status: proposed
    owner: core
    priority: medium
    depends_on:
